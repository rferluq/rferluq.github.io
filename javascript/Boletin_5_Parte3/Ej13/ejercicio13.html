<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Tesoro</title>
    <link rel="stylesheet" href="cssEj13.css">
    <script src="scriptEj13.js" defer></script>
</head>
<body>
    <div class="contenedor">
        <h1>Mapa del Tesoro</h1>
        
        <div class="info">
            Encuentra el tesoro haciendo click en las celdas. La brújula te indicará hacia dónde se encuentra.
        </div>
        
        <div class="coordenadas">
            Haz click en una celda (fila, columna)
        </div>
        
        <div class="mensaje brujula" id="mensaje"></div>
        
        <div class="tabla" id="tabla"></div>
        
        <div class="intentos" id="intentos">Intentos: 0</div>
        
        <div class="botones">
            <button onclick="reiniciarJuego()">Nuevo juego</button>
        </div>
    </div>

</body>
</html>
